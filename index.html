<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단어장</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f13;--bg2:#17171e;--bg3:#1e1e28;--border:#2c2c3a;--accent:#7c6af7;--text:#e2e2ec;--text2:#888899;--text3:#444456;--green:#4ade80;--red:#f87171;--gold:#f0c060;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Pretendard',sans-serif;min-height:100vh;}

  .tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
  .tab{flex:1;padding:16px;border:none;background:none;color:var(--text2);font-family:'Pretendard',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);}
  .tab:hover:not(.active){color:var(--text);}
  .tab .badge{background:var(--accent);color:#fff;font-size:10px;border-radius:10px;padding:1px 6px;font-weight:600;}
  .page{display:none;padding:24px 20px;max-width:720px;margin:0 auto;}
  .page.active{display:block;}

  /* fields */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .field label{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}
  .field input,.field select{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:15px;outline:none;transition:border-color .15s;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .field input::placeholder{color:var(--text3);}
  .field select option{background:var(--bg2);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .kbd{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:0 5px;font-size:10px;color:var(--text3);}

  /* ADD */
  .word-row{display:flex;gap:8px;margin-bottom:12px;}
  .word-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:15px;outline:none;transition:border-color .15s;}
  .word-row input:focus{border-color:var(--accent);}
  .word-row input::placeholder{color:var(--text3);}
  .btn-lookup{padding:0 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-family:'Pretendard',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .btn-lookup:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .btn-lookup:disabled{opacity:.4;cursor:not-allowed;}

  .lookup-card{background:var(--bg3);border:1px solid rgba(124,106,247,.3);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:none;}
  .lc-word{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:2px;}
  .lc-ph{font-size:12px;color:var(--text3);margin-bottom:10px;}
  .lc-sense{margin-bottom:8px;}
  .lc-row{display:flex;gap:7px;align-items:baseline;}
  .lc-type{font-size:11px;color:var(--accent);background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.2);border-radius:4px;padding:1px 6px;white-space:nowrap;flex-shrink:0;}
  .lc-mean{font-size:14px;color:var(--text2);}
  .lc-ex{font-size:12px;color:var(--text3);font-style:italic;margin-top:2px;display:block;}
  .lc-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
  .btn-use-all{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn-use-all:hover{opacity:.85;}
  .btn-use-one{padding:5px 10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-family:'Pretendard',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;margin-top:3px;}
  .btn-use-one:hover{border-color:var(--accent);color:var(--accent);}

  .sec-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .senses-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .sense-row{display:flex;gap:8px;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 12px;}
  .s-type{font-size:11px;color:var(--accent);background:rgba(124,106,247,.12);border:1px solid rgba(124,106,247,.25);border-radius:4px;padding:1px 7px;white-space:nowrap;flex-shrink:0;}
  .s-mean{flex:1;font-size:14px;color:var(--text2);}
  .s-ex{font-size:12px;color:var(--text3);font-style:italic;}
  .sense-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:5px;transition:all .15s;flex-shrink:0;}
  .sense-del:hover{color:var(--red);background:rgba(248,113,113,.1);}
  .sense-form{background:var(--bg3);border:1px dashed var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
  .sense-form .row2{margin-bottom:8px;}
  .btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Pretendard',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-bottom:8px;}
  .btn-primary:hover{opacity:.85;}
  .btn-small{padding:8px 14px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'Pretendard',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
  .btn-small:hover{border-color:var(--accent);color:var(--accent);}
  .flow-hint{font-size:11px;color:var(--text3);text-align:center;line-height:1.8;}

  /* LIST */
  .list-top{display:flex;gap:10px;margin-bottom:12px;align-items:center;}
  .search{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
  .search:focus{border-color:var(--accent);}
  .search::placeholder{color:var(--text3);}
  .list-count{font-size:12px;color:var(--text3);white-space:nowrap;}
  .word-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;transition:border-color .2s;}
  .word-card:hover{border-color:rgba(124,106,247,.35);}
  .wc-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .wc-en{font-family:'DM Serif Display',serif;font-size:20px;flex:1;}
  .wc-meta{font-size:11px;color:var(--text3);}
  .wc-dots{display:flex;gap:3px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--border);}
  .dot.ok{background:var(--green);}
  .dot.ng{background:var(--red);}
  .del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:3px 7px;border-radius:5px;transition:all .15s;}
  .del-btn:hover{color:var(--red);background:rgba(248,113,113,.1);}
  .wc-senses{display:flex;flex-direction:column;gap:4px;}
  .wc-sr{display:flex;gap:7px;align-items:baseline;}
  .ws-type{font-size:11px;color:var(--accent);background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.2);border-radius:4px;padding:1px 6px;white-space:nowrap;flex-shrink:0;}
  .ws-mean{font-size:14px;color:var(--text2);}
  .ws-ex{font-size:12px;color:var(--text3);font-style:italic;margin-left:3px;}

  /* REVIEW SETTINGS */
  .rev-cfg{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
  .cfg-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .cfg-row:last-child{border-bottom:none;padding-bottom:0;}
  .cfg-row:first-child{padding-top:0;}
  .cfg-lbl{font-size:14px;color:var(--text2);}
  .cfg-lbl small{display:block;font-size:11px;color:var(--text3);margin-top:2px;}
  .seg{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .seg-btn{padding:6px 14px;border:none;background:none;color:var(--text2);font-family:'Pretendard',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
  .seg-btn.active{background:var(--accent);color:#fff;}
  .seg-btn:hover:not(.active){color:var(--text);}
  .num-inp{width:72px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;text-align:center;outline:none;}
  .num-inp:focus{border-color:var(--accent);}

  /* REVIEW QUIZ */
  .prog-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:22px;}
  .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
  .q-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:44px 32px 36px;text-align:center;margin-bottom:16px;transition:border-color .25s;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
  .q-card.ok{border-color:var(--green);}
  .q-card.ng{border-color:var(--red);animation:shake .35s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .q-dir{font-size:11px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;}
  .q-pos{font-size:12px;color:var(--accent);background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.2);border-radius:5px;padding:2px 9px;}
  .q-word{font-family:'DM Serif Display',serif;font-size:44px;line-height:1.15;}


  /* answer reveal */
  .ans-reveal{background:var(--bg3);border-radius:10px;padding:13px 16px;margin-bottom:12px;display:none;line-height:1.8;}
  .ans-status{font-size:12px;font-weight:600;margin-bottom:5px;}
  .ans-status.ok{color:var(--green);}
  .ans-status.ng{color:var(--red);}
  .ans-typed{font-size:12px;color:var(--text3);margin-bottom:6px;}
  .ans-typed b{color:var(--text2);font-weight:400;font-style:italic;}
  .ans-divider{font-size:11px;color:var(--text3);margin-bottom:5px;}
  .ans-sense{display:flex;gap:7px;align-items:baseline;margin-bottom:2px;}
  .as-type{font-size:11px;color:var(--accent);background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.2);border-radius:4px;padding:1px 6px;flex-shrink:0;}
  .as-mean{color:var(--gold);font-family:'DM Serif Display',serif;font-size:17px;}
  .as-ex{font-size:12px;color:var(--text3);font-style:italic;margin-left:3px;}
  .as-en{color:var(--gold);font-family:'DM Serif Display',serif;font-size:22px;}

  .q-input-wrap{display:flex;gap:8px;margin-bottom:10px;}
  .q-input{flex:1;background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:13px 18px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:17px;outline:none;text-align:center;transition:border-color .15s;}
  .q-input:focus{border-color:var(--accent);}
  .q-input.ok{border-color:var(--green);color:var(--green);}
  .q-input.ng{border-color:var(--red);color:var(--red);}
  .q-btns{display:flex;gap:8px;}
  .btn-main{flex:1;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Pretendard',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn-main:hover{opacity:.85;}
  .btn-sub{padding:13px 18px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text2);font-family:'Pretendard',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;}
  .btn-sub:hover{border-color:var(--text2);color:var(--text);}
  .done-screen{display:none;text-align:center;padding:60px 20px;}
  .done-pct{font-family:'DM Serif Display',serif;font-size:72px;color:var(--accent);}
  .done-msg{color:var(--text2);font-size:15px;margin:8px 0 32px;}
  .done-btns{display:flex;gap:10px;justify-content:center;}
  .empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;line-height:2;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:14px;pointer-events:none;transition:transform .25s;z-index:99;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.ok{color:var(--green);border-color:rgba(74,222,128,.3);}
  .toast.ng{color:var(--red);border-color:rgba(248,113,113,.3);}
  @media(max-width:480px){.row2{grid-template-columns:1fr;}.q-word{font-size:34px;}.cfg-row{flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="go('add')">추가</button>
  <button class="tab" onclick="go('list')">단어장 <span class="badge" id="badge">0</span></button>
  <button class="tab" onclick="go('review')">복습</button>
  <button class="tab" onclick="go('cfg')" id="tabCfg">⚙</button>
</div>

<!-- ══ ADD ══ -->
<div class="page active" id="page-add">
  <div style="font-size:11px;color:var(--text3);margin-bottom:10px;">
    영단어 입력 후 <span class="kbd">Enter</span> 로 AI 조회, 또는 직접 뜻 추가 &nbsp;|&nbsp; <span class="kbd">Ctrl+Enter</span> 저장
  </div>

  <div class="word-row">
    <input id="iWord" placeholder="영단어" autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();lookupWord();}">
    <button class="btn-lookup" id="btnLookup" onclick="lookupWord()">
      <span id="lSpin" class="spin" style="display:none"></span>AI 조회
    </button>
  </div>

  <div class="lookup-card" id="lookupCard"></div>

  <div class="sec-label">등록할 뜻 <span style="font-size:10px;font-style:italic;text-transform:none;color:var(--text3)">여러 개 가능</span></div>
  <div class="senses-list" id="sensesList"></div>

  <div class="sense-form">
    <div class="row2">
      <div class="field" style="margin-bottom:8px">
        <label>품사</label>
        <select id="sType">
          <option value="">—</option><option value="n.">명사</option><option value="v.">동사</option>
          <option value="adj.">형용사</option><option value="adv.">부사</option>
          <option value="prep.">전치사</option><option value="phr.">구동사</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>난이도</label>
        <select id="sDiff"><option value="1">쉬움</option><option value="2" selected>보통</option><option value="3">어려움</option></select>
      </div>
    </div>
    <div class="field" style="margin-bottom:8px">
      <label>뜻</label>
      <input id="sMean" placeholder="e.g. (운동)선수" autocomplete="off" onkeydown="onMeanKey(event)">
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>예문 <span style="font-size:10px;color:var(--text3);text-transform:none">(선택)</span></label>
      <input id="sEx" placeholder="예문 → Enter 로 뜻 추가" onkeydown="onExKey(event)">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-small" onclick="commitSense()">뜻 추가</button>
      <button class="btn-small" onclick="clearSenseForm()">지우기</button>
    </div>
  </div>

  <button class="btn-primary" onclick="saveWord()">단어 저장</button>
</div>

<!-- ══ LIST ══ -->
<div class="page" id="page-list">
  <div class="list-top">
    <input class="search" id="searchInput" placeholder="검색..." oninput="renderList()">
    <span class="list-count" id="listCount"></span>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="btn-small" onclick="exportData()">💾 내보내기</button>
    <button class="btn-small" onclick="document.getElementById('impFile').click()">📂 가져오기</button>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
  <div id="wordList"></div>
</div>

<!-- ══ REVIEW ══ -->
<div class="page" id="page-review">

  <div id="revCfgScreen">
    <div class="rev-cfg">
      <div class="cfg-row">
        <div class="cfg-lbl">출제 범위<small>어떤 단어를 낼지</small></div>
        <div class="seg">
          <button class="seg-btn active" onclick="setSeg('pool','all',this)">전체</button>
          <button class="seg-btn" onclick="setSeg('pool','weak',this)">취약</button>
          <button class="seg-btn" onclick="setSeg('pool','new',this)">새 단어</button>
        </div>
      </div>
      <div class="cfg-row">
        <div class="cfg-lbl">문제 수<small>최대 출제 수</small></div>
        <input class="num-inp" type="number" id="cfgCount" value="20" min="5" max="200">
      </div>
      <div class="cfg-row">
        <div class="cfg-lbl">출제 방향<small>어느 방향으로 물어볼지</small></div>
        <div class="seg">
          <button class="seg-btn active" onclick="setSeg('dir','both',this)">혼합</button>
          <button class="seg-btn" onclick="setSeg('dir','enko',this)">EN→KO</button>
          <button class="seg-btn" onclick="setSeg('dir','koen',this)">KO→EN</button>
        </div>
      </div>
      <div class="cfg-row">
        <div class="cfg-lbl">순서<small>우선순위 or 랜덤</small></div>
        <div class="seg">
          <button class="seg-btn active" onclick="setSeg('order','smart',this)">스마트</button>
          <button class="seg-btn" onclick="setSeg('order','random',this)">랜덤</button>
        </div>
      </div>
    </div>
    <button class="btn-primary" onclick="beginReview()">복습 시작</button>
  </div>

  <div id="quizArea" style="display:none">
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:13px;color:var(--text3)" id="progText">1/0</span>
      <span style="font-size:13px"><span style="color:var(--green)">✓<span id="sOk">0</span></span>&nbsp;&nbsp;<span style="color:var(--red)">✗<span id="sNg">0</span></span></span>
    </div>
    <div class="q-card" id="qCard">
      <div class="q-dir" id="qDir"></div>
      <div class="q-pos" id="qPos" style="display:none"></div>
      <div class="q-word" id="qWord"></div>
    </div>

    <div class="ans-reveal" id="ansReveal"></div>
    <div class="q-input-wrap">
      <input class="q-input" id="qInput" placeholder="정답 입력" onkeydown="if(event.key==='Enter')checkAns()" autocomplete="off">
    </div>
    <div class="q-btns">
      <button class="btn-main" id="btnCheck" onclick="checkAns()">확인</button>
      <button class="btn-sub" onclick="skipWord()">건너뛰기</button>
      <button class="btn-sub" onclick="endReview()">종료</button>
    </div>
  </div>

  <div class="done-screen" id="doneScreen">
    <div class="done-pct" id="donePct">—</div>
    <div class="done-msg" id="doneMsg"></div>
    <div class="done-btns">
      <button class="btn-main" style="flex:none;padding:12px 28px" onclick="beginReview()">다시</button>
      <button class="btn-sub" onclick="showCfg()">설정</button>
    </div>
  </div>
</div>

<!-- ══ CFG ══ -->
<div class="page" id="page-cfg">
  <div class="field">
    <label>Anthropic API 키</label>
    <div style="display:flex;gap:8px">
      <input type="password" id="cfgApiKey" placeholder="sk-ant-..." autocomplete="off"
        style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Pretendard',sans-serif;font-size:15px;outline:none;transition:border-color .15s;"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"
        onkeydown="if(event.key==='Enter')saveApiKey()">
      <button class="btn-small" onclick="toggleKeyVis()">👁</button>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:6px;line-height:1.7">
      키는 이 기기의 브라우저에만 저장돼요 — 파일 안에 들어가지 않아요.<br>
      무료 발급: <span style="color:var(--accent)">aistudio.google.com</span> → Get API key → Create API key
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
    <button class="btn-primary" style="flex:none;padding:11px 24px;width:auto" onclick="saveApiKey()">저장</button>
    <span id="cfgKeyStatus" style="font-size:13px;color:var(--text3)"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ───────────────────────────────────────────────
const KEY='vocab_v2';
const load=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch{return[];}};
const save=ws=>{localStorage.setItem(KEY,JSON.stringify(ws));refreshBadge();};

// ── SM-2 ──────────────────────────────────────────────────
function updateSM2(w,ok){
  w={...w};const ef=w.ef||2.5,iv=w.iv||0,now=Date.now();
  if(!ok){w.iv=1;w.ef=Math.max(1.3,ef-.2);w.nextRev=now+10*60*1000;}
  else{const niv=iv===0?1:iv===1?6:Math.round(iv*ef);w.iv=niv;w.ef=Math.min(3.0,ef+.1);w.nextRev=now+niv*86400000;}
  return w;
}
function priority(w){
  const now=Date.now(),h=w.hist||[];
  const acc=h.length?h.filter(x=>x.ok).length/h.length:-1;
  const overdue=Math.max(0,(now-(w.nextRev||w.at))/86400000);
  let s=overdue*10+(w.senses?Math.max(...w.senses.map(s=>s.diff||2)):2)*5;
  if(acc<0)s+=50;else if(acc<.5)s+=40;else if(acc<.75)s+=20;
  return s;
}

// ── TABS ──────────────────────────────────────────────────
const PAGES=['add','list','review','cfg'];
function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.tab')[PAGES.indexOf(id)].classList.add('active');
  if(id==='list')renderList();
  if(id==='add')setTimeout(()=>document.getElementById('iWord').focus(),80);
  if(id==='cfg')initCfgPage();
}
function refreshBadge(){document.getElementById('badge').textContent=load().length;}

// ── API KEY ───────────────────────────────────────────────
const AKEY='vocab_apikey';
const getApiKey=()=>localStorage.getItem(AKEY)||'';
function saveApiKey(){
  const v=document.getElementById('cfgApiKey').value.trim();
  if(!v){toast('키를 입력해주세요','ng');return;}
  localStorage.setItem(AKEY,v);
  updateKeyStatus();
  toast('저장됨','ok');
}
function toggleKeyVis(){
  const inp=document.getElementById('cfgApiKey');
  inp.type=inp.type==='password'?'text':'password';
}
function initCfgPage(){
  const k=getApiKey();
  const inp=document.getElementById('cfgApiKey');
  if(k) inp.value=k;
  updateKeyStatus();
}
function updateKeyStatus(){
  const k=getApiKey();
  const el=document.getElementById('cfgKeyStatus');
  if(!el)return;
  el.textContent=k?'✓ 키 저장됨 ('+k.slice(0,12)+'…)':'키 없음 — AI 기능 비활성화';
  el.style.color=k?'var(--green)':'var(--text3)';
}

// ── AI LOOKUP (단어 추가 시) ───────────────────────────────
let lookupData=[];

async function lookupWord(){
  const word=document.getElementById('iWord').value.trim();
  if(!word)return;
  const apiKey=getApiKey();
  if(!apiKey){toast('⚙ 설정에서 API 키를 먼저 입력해주세요','ng');go('cfg');return;}
  const btn=document.getElementById('btnLookup'),sp=document.getElementById('lSpin');
  btn.disabled=true;sp.style.display='inline-block';
  document.getElementById('lookupCard').style.display='none';

  try{
    const prompt=`Look up the English word "${word}" and return ONLY a raw JSON object (no markdown, no backticks, no explanation):
{"word":"${word}","phonetic":"IPA pronunciation or empty string","senses":[{"type":"n. or v. or adj. or adv. or prep. or phr.","mean":"Korean meaning — use parentheses for optional parts e.g. (운동)선수","ex":"one short natural English example sentence"}]}
Include 1-4 most common meanings. Korean must be natural. Reply with the JSON object only.`;

    const res=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
         generationConfig:{temperature:0.1,maxOutputTokens:700}})}
    );
    const data=await res.json();
    const raw=(data.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
    const parsed=JSON.parse(raw.replace(/^```json?|```$/gm,'').trim());
    lookupData=parsed.senses||[];
    renderLookup(parsed);
  }catch(e){
    toast('조회 실패 — 직접 입력해주세요','ng');
    document.getElementById('sMean').focus();
  }finally{btn.disabled=false;sp.style.display='none';}
}

function renderLookup(d){
  const card=document.getElementById('lookupCard');
  const sh=d.senses.map((s,i)=>`
    <div class="lc-sense">
      <div class="lc-row"><span class="lc-type">${s.type||'—'}</span><span class="lc-mean">${esc(s.mean)}</span></div>
      ${s.ex?`<span class="lc-ex">${esc(s.ex)}</span>`:''}
      <button class="btn-use-one" onclick="useSense(${i})">이 뜻만 추가</button>
    </div>`).join('');
  card.innerHTML=`
    <div class="lc-word">${esc(d.word)}${d.phonetic?` <span style="font-size:13px;color:var(--text3)">${esc(d.phonetic)}</span>`:''}</div>
    <div style="margin-bottom:10px">${sh}</div>
    <div class="lc-actions">
      <button class="btn-use-all" onclick="useAll()">전부 추가</button>
      <span style="font-size:11px;color:var(--text3)">또는 원하는 뜻만 선택</span>
    </div>`;
  card.style.display='block';
}

function useSense(i){
  const s=lookupData[i];if(!s)return;
  pendingSenses.push({type:s.type||'',mean:s.mean,ex:s.ex||'',diff:2});
  renderSensesList();toast('추가됨','ok');
}
function useAll(){
  lookupData.forEach(s=>pendingSenses.push({type:s.type||'',mean:s.mean,ex:s.ex||'',diff:2}));
  renderSensesList();
  document.getElementById('lookupCard').style.display='none';
  toast(lookupData.length+'개 추가됨','ok');
}

// ── ADD ───────────────────────────────────────────────────
let pendingSenses=[];

function renderSensesList(){
  const el=document.getElementById('sensesList');
  if(!pendingSenses.length){el.innerHTML='';return;}
  el.innerHTML=pendingSenses.map((s,i)=>`
    <div class="sense-row">
      ${s.type?`<span class="s-type">${s.type}</span>`:''}
      <span class="s-mean">${esc(s.mean)}</span>
      ${s.ex?`<span class="s-ex">${esc(s.ex)}</span>`:''}
      <button class="sense-del" onclick="removeSense(${i})">✕</button>
    </div>`).join('');
}
function removeSense(i){pendingSenses.splice(i,1);renderSensesList();}
function onMeanKey(e){if(e.key==='Enter'){e.preventDefault();document.getElementById('sEx').focus();}}
function onExKey(e){if(e.key==='Enter'){e.preventDefault();commitSense();}}
function commitSense(){
  const mean=document.getElementById('sMean').value.trim();
  if(!mean){document.getElementById('sMean').focus();return;}
  pendingSenses.push({type:document.getElementById('sType').value,mean,ex:document.getElementById('sEx').value.trim(),diff:+document.getElementById('sDiff').value});
  renderSensesList();clearSenseForm();document.getElementById('sMean').focus();
}
function clearSenseForm(){
  ['sMean','sEx'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sType').value='';document.getElementById('sDiff').value='2';
}
function saveWord(){
  const word=document.getElementById('iWord').value.trim();
  if(!word){toast('영단어를 입력해주세요','ng');document.getElementById('iWord').focus();return;}
  if(document.getElementById('sMean').value.trim())commitSense();
  if(!pendingSenses.length){toast('뜻을 하나 이상 추가해주세요','ng');document.getElementById('sMean').focus();return;}
  const words=load();
  if(words.find(w=>w.word.toLowerCase()===word.toLowerCase())){toast('이미 있는 단어예요','ng');return;}
  words.push({id:Date.now(),word,senses:[...pendingSenses],at:Date.now(),hist:[],ef:2.5,iv:0,nextRev:null});
  save(words);toast('추가됨: '+word,'ok');
  document.getElementById('iWord').value='';
  document.getElementById('lookupCard').style.display='none';
  lookupData=[];pendingSenses=[];renderSensesList();clearSenseForm();
  document.getElementById('iWord').focus();
}
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='Enter'&&document.querySelector('.page.active')?.id==='page-add')saveWord();
});

// ── LIST ──────────────────────────────────────────────────
function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase(),all=load();
  const list=q?all.filter(w=>w.word.toLowerCase().includes(q)||w.senses.some(s=>s.mean.includes(q))):all;
  document.getElementById('listCount').textContent=list.length+'개';
  const el=document.getElementById('wordList');
  if(!list.length){el.innerHTML='<div class="empty">단어가 없어요</div>';return;}
  el.innerHTML=[...list].sort((a,b)=>priority(b)-priority(a)).map(w=>{
    const h=(w.hist||[]).slice(-5);
    const dots=Array(5).fill(0).map((_,i)=>{const x=h[i];return x?`<div class="dot ${x.ok?'ok':'ng'}"></div>`:'<div class="dot"></div>';}).join('');
    const sh=(w.senses||[]).map(s=>`<div class="wc-sr">${s.type?`<span class="ws-type">${s.type}</span>`:''}<span class="ws-mean">${esc(s.mean)}</span>${s.ex?`<span class="ws-ex">${esc(s.ex)}</span>`:''}</div>`).join('');
    return `<div class="word-card"><div class="wc-head"><div class="wc-en">${esc(w.word)}</div><div class="wc-dots">${dots}</div><div class="wc-meta">${ago(w.at)}</div><button class="del-btn" onclick="delWord(${w.id})">✕</button></div><div class="wc-senses">${sh}</div></div>`;
  }).join('');
}
function delWord(id){save(load().filter(w=>w.id!==id));renderList();}
function ago(ts){const d=Date.now()-ts,m=~~(d/60000),h=~~(d/3600000),dy=~~(d/86400000);if(m<1)return '방금';if(m<60)return m+'분';if(h<24)return h+'시간';return dy+'일';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── REVIEW SETTINGS ───────────────────────────────────────
const cfg={pool:'all',dir:'both',order:'smart'};
function setSeg(k,v,btn){cfg[k]=v;btn.closest('.seg').querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function showCfg(){document.getElementById('revCfgScreen').style.display='block';document.getElementById('quizArea').style.display='none';document.getElementById('doneScreen').style.display='none';}

function buildQueue(){
  let pool=load();
  if(cfg.pool==='weak')pool=pool.filter(w=>{const h=w.hist||[];return h.length>0&&h.filter(x=>x.ok).length/h.length<.6;});
  else if(cfg.pool==='new')pool=pool.filter(w=>!(w.hist||[]).length);
  if(!pool.length)pool=load();
  const n=Math.min(parseInt(document.getElementById('cfgCount').value)||20,pool.length);
  if(cfg.order==='random'){for(let i=pool.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}return pool.slice(0,n);}
  return pool.sort((a,b)=>priority(b)-priority(a)).slice(0,n);
}

// ── REVIEW QUIZ ───────────────────────────────────────────
let queue=[],qi=0,sOk=0,sNg=0,cur=null,curSense=null,enToKo=true,waiting=false;

function beginReview(){
  if(!load().length){toast('단어를 먼저 추가해주세요','ng');return;}
  queue=buildQueue();if(!queue.length){toast('조건에 맞는 단어가 없어요','ng');return;}
  qi=0;sOk=0;sNg=0;waiting=false;
  document.getElementById('revCfgScreen').style.display='none';
  document.getElementById('quizArea').style.display='block';
  document.getElementById('doneScreen').style.display='none';
  nextQ();
}
function nextQ(){
  if(qi>=queue.length){endReview();return;}
  cur=queue[qi];waiting=false;
  curSense=cur.senses[~~(Math.random()*cur.senses.length)];
  enToKo=cfg.dir==='enko'?true:cfg.dir==='koen'?false:Math.random()>.3;
  document.getElementById('qCard').className='q-card';
  document.getElementById('qDir').textContent=enToKo?'EN → KO':'KO → EN';
  const pe=document.getElementById('qPos');
  if(curSense.type){pe.textContent=curSense.type;pe.style.display='inline-block';}else pe.style.display='none';
  document.getElementById('qWord').textContent=enToKo?cur.word:curSense.mean;
  const inp=document.getElementById('qInput');
  inp.value='';inp.className='q-input';inp.disabled=false;inp.placeholder=enToKo?'한국어 뜻':'영단어';
  document.getElementById('ansReveal').style.display='none';
  document.getElementById('btnCheck').textContent='확인';
  document.getElementById('progFill').style.width=(qi/queue.length*100)+'%';
  document.getElementById('progText').textContent=(qi+1)+' / '+queue.length;
  document.getElementById('sOk').textContent=sOk;document.getElementById('sNg').textContent=sNg;
  setTimeout(()=>inp.focus(),80);
}



function norm(s){
  return s.trim().toLowerCase()
    .replace(/[()（）【】「」『』]/g,'')          // 괄호 제거
    .replace(/[~∼〜～]/g,'')                     // 틸데 제거
    .replace(/[-·•]/g,' ')                       // 구분자 → 공백
    .replace(/[,，、.\/]/g,' ')                  // 쉼표·슬래시 → 공백
    .replace(/에\s*대한|에\s*관한|에\s*대해|에\s*관해/g,'') // ~에 대한/관한
    .replace(/하다$/,'')                         // 동사형 어미
    .replace(/(은|는|이|가|을|를|의|에|도|로|으로|과|와|한|적|인)$/,'') // 조사/접미
    .replace(/\s+/g,'')                          // 공백 전부 제거 후 비교
    .trim();
}

function localJudge(user, wordEntry, isEnToKo){
  const u = norm(user);
  if(!u) return false;

  if(isEnToKo){
    const variants = new Set();
    (wordEntry.senses||[]).forEach(s=>{
      const raw = s.mean;
      variants.add(norm(raw));
      // (운동)선수 → 운동선수
      variants.add(norm(raw.replace(/\(([^)]+)\)/g,'$1')));
      // (운동)선수 → 선수
      variants.add(norm(raw.replace(/\([^)]+\)/g,'')));
      // 쉼표/슬래시 분리
      raw.split(/[,，、\/]+/).forEach(p=>variants.add(norm(p)));
      // 괄호 안 내용만
      const inner=raw.match(/\(([^)]+)\)/g);
      if(inner) inner.forEach(m=>variants.add(norm(m)));
    });

    const arr=[...variants].filter(a=>a.length>0);
    // 1) 완전 일치
    if(arr.some(a=>a===u)) return true;
    // 2) 한쪽이 다른쪽을 포함 (2글자 이상)
    if(arr.some(a=>a.length>=2&&(a.includes(u)||u.includes(a)))) return true;
    return false;

  }else{
    // 영어: 공백·대소문자 무시 후 레벤슈타인
    const t = wordEntry.word.trim().toLowerCase().replace(/\s+/g,'');
    const uEn = user.trim().toLowerCase().replace(/\s+/g,'');
    if(t===uEn) return true;
    const maxErr = t.length<=4?0:t.length<=7?1:2;
    return lev(uEn,t)<=maxErr;
  }
}
function lev(a,b){
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

// ── BUILD REVEAL ──────────────────────────────────────────
function buildReveal(ok,typed,wordEntry,isEnToKo){
  // Always show: status + what user typed + correct answer(s)
  const statusHtml=`<div class="ans-status ${ok?'ok':'ng'}">${ok?'✓ 정답':'✗ 오답'}</div>`;
  const typedHtml=`<div class="ans-typed">내 답: <b>${esc(typed)}</b></div>`;
  const divider=`<div class="ans-divider">정답</div>`;

  if(isEnToKo){
    const sh=(wordEntry.senses||[]).map(s=>`
      <div class="ans-sense">
        ${s.type?`<span class="as-type">${s.type}</span>`:''}
        <span class="as-mean">${esc(s.mean)}</span>
        ${s.ex?`<span class="as-ex">${esc(s.ex)}</span>`:''}
      </div>`).join('');
    return statusHtml+typedHtml+divider+sh;
  }else{
    return statusHtml+typedHtml+divider+`<div class="as-en">${esc(wordEntry.word)}</div>`;
  }
}

function checkAns(){
  if(waiting){qi++;nextQ();return;}
  const inp=document.getElementById('qInput');
  if(!inp.value.trim())return;
  const typed=inp.value;
  inp.disabled=true;

  const ok=localJudge(typed,cur,enToKo);

  inp.className='q-input '+(ok?'ok':'ng');
  document.getElementById('qCard').classList.add(ok?'ok':'ng');

  const rev=document.getElementById('ansReveal');
  rev.style.display='block';
  rev.innerHTML=buildReveal(ok,typed,cur,enToKo);

  ok?sOk++:sNg++;
  document.getElementById('sOk').textContent=sOk;document.getElementById('sNg').textContent=sNg;
  document.getElementById('btnCheck').textContent='다음 →';
  waiting=true;

  const words=load(),i=words.findIndex(w=>w.id===cur.id);
  if(i>=0){words[i].hist=words[i].hist||[];words[i].hist.push({date:Date.now(),ok});Object.assign(words[i],updateSM2(words[i],ok));save(words);}
}
function skipWord(){
  if(waiting){qi++;nextQ();return;}
  const words=load(),i=words.findIndex(w=>w.id===cur.id);
  if(i>=0){words[i].hist=words[i].hist||[];words[i].hist.push({date:Date.now(),ok:false});Object.assign(words[i],updateSM2(words[i],false));save(words);}
  sNg++;qi++;nextQ();
}
function endReview(){
  document.getElementById('quizArea').style.display='none';document.getElementById('doneScreen').style.display='block';
  const t=sOk+sNg,pct=t?Math.round(sOk/t*100):0;
  document.getElementById('donePct').textContent=pct+'%';
  document.getElementById('doneMsg').textContent=`${sOk}/${t}개 정답  ·  `+['다시 한번!','조금만 더!','잘 하고 있어요','훌륭해요!','완벽해요! 🎉'][Math.min(4,~~(pct/20))];
}

// ── EXPORT / IMPORT ───────────────────────────────────────
function exportData(){
  const words=load();if(!words.length){toast('내보낼 단어가 없어요','ng');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(words,null,2)],{type:'application/json'}));
  const d=new Date();a.download=`vocab_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();toast(words.length+'개 내보내기 완료','ok');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const inc=JSON.parse(ev.target.result);if(!Array.isArray(inc))throw 0;
      const ex=load(),ids=new Set(ex.map(w=>w.id)),ws=new Set(ex.map(w=>w.word.toLowerCase()));
      const add=inc.filter(w=>!ids.has(w.id)&&!ws.has(w.word.toLowerCase()));
      save([...ex,...add]);renderList();
      toast(`${add.length}개 추가 (중복 ${inc.length-add.length}개 건너뜀)`,'ok');
    }catch{toast('올바른 파일이 아니에요','ng');}
    e.target.value='';
  };r.readAsText(file);
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg,type='ok'){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

refreshBadge();
if(!getApiKey()) document.getElementById('tabCfg').style.color='var(--gold)';
</script>
